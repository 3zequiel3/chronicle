name: skill-check

# Red de regresión de la skill: corre en cada push y PR.
on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run skill regression net
        run: python3 tests/check_skill.py
